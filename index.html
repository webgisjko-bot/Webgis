<!doctype html>
<html lang="en">
    <style>

html, body, #map {
    width:100%;
    height:100%;
    margin:0;
    padding:0;
}

#title{
    position:absolute;
    top:10px;
    left:60px;
    z-index:9999;
    background:#ffffff;
    padding:12px 20px;
    border-radius:12px;
    box-shadow:0 3px 15px rgba(0,0,0,.25);
    font-size:22px;
    font-weight:bold;
    font-family:Segoe UI, Arial;
}

#info{
    position:absolute;
    bottom:20px;
    left:10px;
    width:280px;
    z-index:9999;
    background:#ffffff;
    padding:15px;
    border-radius:12px;
    box-shadow:0 3px 15px rgba(0,0,0,.25);
    font-family:Segoe UI, Arial;
}

#coords{
    position:absolute;
    bottom:15px;
    right:15px;
    z-index:9999;
    background:#ffffff;
    padding:10px 15px;
    border-radius:10px;
    box-shadow:0 3px 15px rgba(0,0,0,.25);
    font-family:Consolas;
    min-width:160px;
}

.ol-control{
    background:rgba(255,255,255,.9)!important;
    border-radius:10px!important;
    box-shadow:0 2px 10px rgba(0,0,0,.25)!important;
}

.ol-control button{
    border-radius:8px!important;
}

.ol-popup{
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,.35);
}

.ol-layerswitcher{
    border-radius:12px!important;
}

</style>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
        </style>

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title></title>
    </head>
   <body>

<div id="title">
    🌍 WEBGIS BATAS BLOK
</div>

<div id="info">
    <h3>Informasi</h3>
    <p>Klik objek pada peta untuk melihat atribut.</p>
    <hr>
    <p><b>Sistem:</b> WebGIS Internal</p>
</div>

<div id="coords">
    Lat: -<br>
    Lon: -
</div>

<div id="map">
    <div id="popup" class="ol-popup">
        <a href="#" id="popup-closer" class="ol-popup-closer"></a>
        <div id="popup-content"></div>
    </div>
</div>

<script src="resources/qgis2web_expressions.js"></script>
<script src="./resources/functions.js"></script>
<script src="./resources/ol.js"></script>
<script src="./resources/ol-layerswitcher.js"></script>
<script src="resources/photon-geocoder-autocomplete.min.js"></script>
<script src="resources/olms.js"></script>
<script src="layers/Batas_Blok_Edited__1.js"></script>
<script src="styles/Batas_Blok_Edited__1_style.js"></script>
<script src="./layers/layers.js"></script>
<script src="./resources/Autolinker.min.js"></script>
<script src="./resources/qgis2web.js"></script>

<script>
setTimeout(function(){

    if(typeof map !== 'undefined'){
        map.on('pointermove', function(evt) {

            var coord = ol.proj.toLonLat(evt.coordinate);

            document.getElementById('coords').innerHTML =
                'Lat : ' + coord[1].toFixed(6) +
                '<br>Lon : ' + coord[0].toFixed(6);

        });
    }

},1000);
</script>

</body>
</html>
