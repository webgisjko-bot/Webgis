       <script>

function lokasiSaya(){

    navigator.geolocation.getCurrentPosition(

        function(pos){

            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            let coord =
                ol.proj.fromLonLat([lon,lat]);

            map.getView().animate({
                center:coord,
                zoom:18
            });

        },

        function(){

            alert("GPS tidak tersedia");

        }

    );

}

</script>
<button id="gpsBtn" onclick="lokasiSaya()">
📍 Lokasi Saya
</button>

<script>
setTimeout(function(){

    if(typeof map !== 'undefined'){
        map.on('pointermove', function(evt) {

            var coord = ol.proj.toLonLat(evt.coordinate);

            document.getElementById('coords').innerHTML =
                'Lat : ' + coord[1].toFixed(6) +
                '<br>Lon : ' + coord[0].toFixed(6);

        });
    }

},1000);
</script>
<script>

let coordMarker = null;

function dmsToDecimal(d,m,s,dir){

    let dec =
        parseFloat(d) +
        parseFloat(m)/60 +
        parseFloat(s)/3600;

    if(dir=="S" || dir=="W"){
        dec = -dec;
    }

    return dec;
}

function searchCoordinate(){

    let input =
        document.getElementById("coordInput")
        .value
        .trim();

    let lat, lon;

    if(input.includes(",")){

        let p = input.split(",");

        lat = parseFloat(p[0]);
        lon = parseFloat(p[1]);

        if(!isNaN(lat) && !isNaN(lon)){
            zoomToCoordinate(lat,lon);
            return;
        }
    }

    let regex =
    /(\d+)[°]\s*(\d+)'?\s*([\d.]+)"?\s*([NS]).*?(\d+)[°]\s*(\d+)'?\s*([\d.]+)"?\s*([EW])/i;

    let m = input.match(regex);

    if(m){

        lat = dmsToDecimal(
            m[1],m[2],m[3],m[4].toUpperCase()
        );

        lon = dmsToDecimal(
            m[5],m[6],m[7],m[8].toUpperCase()
        );

        zoomToCoordinate(lat,lon);
        return;
    }

    alert("Format koordinat tidak dikenali");
}

function zoomToCoordinate(lat,lon){

    let coordinate =
        ol.proj.fromLonLat([lon,lat]);

    map.getView().animate({
        center:coordinate,
        zoom:18,
        duration:1200
    });

    if(coordMarker){
        map.removeOverlay(coordMarker);
    }

    let marker =
        document.createElement("div");

    marker.innerHTML="📍";

    marker.style.fontSize="36px";

    coordMarker = new ol.Overlay({
        position:coordinate,
        element:marker
    });

    map.addOverlay(coordMarker);

    alert(
        "Latitude : " + lat.toFixed(6) +
        "\nLongitude : " + lon.toFixed(6)
    );
}

document
.getElementById("coordInput")
.addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        searchCoordinate();
    }

});

</script>
</body>
    <div id="coordSearch">

           id="coordInput"
           placeholder="Cari koordinat (DD atau DMS)...">

    <button onclick="searchCoordinate()">
        🔍
    </button>
